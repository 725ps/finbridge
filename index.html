<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinBridge | Al-Futtaim Automotive</title>
<meta name="theme-color" content="#1B2A4A">
<meta name="apple-mobile-web-app-title" content="FinBridge">
<link rel="apple-touch-icon" href="assets/logos/finbridge-tile.png">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231B2A4A'/><path d='M5 22 L27 22 M10 22 L10 9 M22 22 L22 9' stroke='white' stroke-width='2' fill='none' stroke-linecap='round'/><path d='M5 17 Q10 10 16 16 Q22 22 27 8' stroke='%232563EB' stroke-width='2.2' fill='none' stroke-linecap='round'/><path d='M27 8 l-3.5 1 M27 8 l-1 3.5' stroke='%232563EB' stroke-width='2.2' fill='none' stroke-linecap='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1B2A4A;--navy-l:#243656;--blue:#2563EB;--blue-bg:#EFF6FF;--blue-bdr:#BFDBFE;--green:#059669;--green-bg:#ECFDF5;--green-bdr:#A7F3D0;--amber:#D97706;--amber-bg:#FFFBEB;--red:#DC2626;--red-bg:#FEF2F2;--red-bdr:#FECACA;--gray:#6B7280;--gray-bg:#F4F5F7;--gray-bdr:#E5E7EB;--muted:#9CA3AF;--text:#1A1A2E;--text2:#374151;--white:#FFFFFF;--r:12px;--rs:8px;--shadow:0 1px 3px rgba(0,0,0,0.06)}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--gray-bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
table{border-collapse:collapse;width:100%}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sb{width:260px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:width 0.3s ease,transform 0.3s ease;overflow:hidden}
.sb.col{width:64px}
.sb-hd{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);min-height:80px}
.sb-logo{height:28px;margin-bottom:6px;opacity:0.9}
.sb-brand{font-size:10px;font-weight:700;color:#93C5FD;letter-spacing:2px;white-space:nowrap;overflow:hidden}
.sb-title{font-size:15px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--rs);margin-bottom:2px;cursor:pointer;transition:all 0.15s;font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);white-space:nowrap}
.sb-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.sb-item.act{background:rgba(255,255,255,0.12);color:#fff;font-weight:600}
.sb-item.dis{opacity:0.3;cursor:default}
.sb-item .ic{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.sb-badge{font-size:9px;background:var(--blue);padding:2px 8px;border-radius:4px;font-weight:700}
.sb-ctx{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);font-size:12px;white-space:nowrap;overflow:hidden}
.sb-ctx .lbl{color:#93C5FD;font-weight:700;font-size:10px;letter-spacing:1.5px;margin-bottom:8px}
.sb-toggle{padding:12px;background:rgba(255,255,255,0.04);border:none;color:#94A3B8;font-size:13px;text-align:center;transition:all 0.15s;white-space:nowrap}
.sb-toggle:hover{background:rgba(255,255,255,0.08)}

/* Main */
.mn{margin-left:260px;flex:1;padding:28px 36px;max-width:1200px;transition:margin-left 0.3s}
.mn.exp{margin-left:64px}

/* Cards & Components */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--gray-bdr);padding:20px;transition:all 0.2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.card-hd{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:14px}
.stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--white);border-radius:var(--r);padding:16px 20px;flex:1;min-width:130px;border-left:4px solid var(--navy)}
.stat .v{font-size:26px;font-weight:800;line-height:1}
.stat .l{font-size:11px;color:var(--gray);margin-top:4px;font-weight:500}
.pill{display:inline-flex;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:0.3px}
.pill-closed{background:var(--green-bg);color:var(--green)}.pill-on_track{background:var(--blue-bg);color:var(--blue)}
.pill-at_risk{background:var(--amber-bg);color:var(--amber)}.pill-blocked,.pill-overdue{background:var(--red-bg);color:var(--red)}
.pill-completed{background:var(--green-bg);color:var(--green)}.pill-in_progress{background:var(--blue-bg);color:var(--blue)}
.pill-waiting,.pill-not_started{background:#F3F4F6;color:var(--muted)}.pill-ready{background:#F5F3FF;color:#7C3AED}
.pbar{width:100%;height:6px;background:#E5E7EB;border-radius:6px;overflow:hidden}
.pfill{height:100%;border-radius:6px;transition:width 0.5s ease}
.badge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;flex-shrink:0}

/* Entity Grid */
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ecard{background:var(--white);border-radius:var(--r);padding:16px;border:1px solid var(--gray-bdr);cursor:pointer;transition:all 0.2s}
.ecard:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);border-color:var(--blue-bdr)}

/* Tables */
.dtbl{font-size:13px}
.dtbl th{padding:8px 12px;text-align:left;font-weight:600;color:var(--gray);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--gray-bdr)}
.dtbl td{padding:10px 12px;border-bottom:1px solid #F3F4F6}
.dtbl tr:hover{background:#FAFAFA}

/* Sub-process rows */
.spr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background 0.15s}
.spr:hover{background:#FAFAFA;margin:0 -8px;padding:10px 8px;border-radius:6px}

/* Breadcrumb */
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-bottom:16px;flex-wrap:wrap}
.bc a{color:var(--blue);cursor:pointer;font-weight:500;text-decoration:none}
.bc a:hover{text-decoration:underline}
.bc .cur{color:var(--text);font-weight:600}

/* Flow */
.fnode{position:absolute;border-radius:10px;padding:12px 10px;text-align:center;cursor:pointer;transition:all 0.2s;z-index:2}
.fnode:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(0,0,0,0.12)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;border:none;transition:all 0.15s}
.btn-p{background:var(--navy);color:#fff}.btn-p:hover{background:var(--navy-l)}
.btn-o{background:transparent;border:1px solid var(--gray-bdr);color:var(--text)}.btn-o:hover{background:#F3F4F6}
.btn-g{background:var(--green);color:#fff}
.btn-full{width:100%;justify-content:center;padding:12px}

/* Blocker */
.blocker{background:var(--red-bg);border-radius:var(--r);padding:16px;border:1px solid var(--red-bdr);margin-bottom:16px}
.resolution{background:var(--green-bg);border-radius:var(--rs);padding:14px;border:1px solid var(--green-bdr);margin-bottom:12px}

/* Info */
.info{border-radius:var(--rs);padding:14px;margin:16px 0;font-size:13px;line-height:1.6;background:var(--blue-bg);border:1px solid var(--blue-bdr);color:#1E3A5F}

/* Bar chart */
.bars{display:flex;align-items:flex-end;gap:6px;height:130px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.5s;min-height:2px}

/* Config tabs */
.ctabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.ctab{padding:8px 16px;border-radius:var(--rs);border:none;font-size:13px;font-weight:600;transition:all 0.15s}
.ctab.act{background:var(--navy);color:#fff}
.ctab:not(.act){background:#F3F4F6;color:var(--gray)}
.ctab:not(.act):hover{background:#E5E7EB}

/* Instance tree */
.irow{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--rs);margin-bottom:3px;cursor:pointer;transition:all 0.15s}
.irow:hover{background:#F3F4F6}
.irow.act{background:var(--blue-bg);border:1px solid var(--blue-bdr)}

/* Wizard steps */
.wstep{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.wdot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.wdot.done{background:var(--green);color:#fff}
.wdot.cur{background:var(--blue);color:#fff}
.wdot.pend{background:#E5E7EB;color:var(--muted)}
.wline{flex:1;height:2px;background:#E5E7EB}

/* Pace chart */
.pace{position:relative;height:160px;background:var(--white);border-radius:var(--r);border:1px solid var(--gray-bdr);padding:20px;margin-bottom:20px}
.pace-grid{position:absolute;inset:40px 20px 30px 40px;display:flex;flex-direction:column;justify-content:space-between}
.pace-line{width:100%;height:1px;background:#F3F4F6}
.pace-labels{position:absolute;bottom:8px;left:40px;right:20px;display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.pace-ylabels{position:absolute;top:40px;bottom:30px;left:4px;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:var(--muted);text-align:right;width:30px}

/* Collapsed sidebar - center icons cleanly */
.sb.col .sb-hd{padding:16px 0;text-align:center}
.sb.col .sb-logo{margin:0 auto 0}
.sb.col .sb-item{justify-content:center;padding:12px 0;gap:0}
.sb.col .sb-item .ic{width:auto}
.sb.col .sb-nav{padding:12px 6px}

/* Top header bar */
.topbar{display:flex;align-items:center;justify-content:space-between;background:var(--white);border-radius:var(--r);border:1px solid var(--gray-bdr);padding:14px 20px;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.tb-left{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.tb-right{display:flex;align-items:center;gap:12px}

/* Period selector dropdown */
.psel{position:relative}
.psel-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600}
.psel-btn:hover{background:var(--navy-l)}
.psel-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--white);border:1px solid var(--gray-bdr);border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,0.12);z-index:100;min-width:340px;padding:8px;max-height:480px;overflow-y:auto}

/* Role selector */
.rsel{position:relative}
.rsel-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--gray-bg);border:1px solid var(--gray-bdr);border-radius:var(--rs);font-size:13px;font-weight:600;color:var(--text2)}
.rsel-btn:hover{background:#E5E7EB}
.rsel-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--white);border:1px solid var(--gray-bdr);border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,0.12);z-index:100;min-width:220px;padding:6px}
.rsel-item{padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.rsel-item:hover{background:var(--gray-bg)}
.rsel-item.act{background:var(--blue-bg);color:var(--blue);font-weight:600}

/* Search */
.search{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--gray-bg);border:1px solid var(--gray-bdr);border-radius:var(--rs);font-size:13px;color:var(--muted);min-width:180px}

/* Context strip */
.ctxstrip{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.ctxstrip .title{font-size:22px;font-weight:800}
.ctxstrip .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--white);border:1px solid var(--gray-bdr);border-radius:20px;font-size:12px;font-weight:500;color:var(--text2)}

/* Circular progress */
.ring-wrap{display:flex;align-items:center;justify-content:center}
.ring-label{font-size:11px;color:var(--gray);text-align:center;margin-top:4px;font-weight:500}

/* Hero layout */
.hero{display:grid;grid-template-columns:1fr 200px;gap:16px;margin-bottom:20px}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hero-ring{background:var(--white);border-radius:var(--r);border:1px solid var(--gray-bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* Two column */
.twocol{display:grid;grid-template-columns:1fr 380px;gap:16px;margin-bottom:20px}

/* Blocker list item */
.blk-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:8px;background:var(--red-bg);border:1px solid var(--red-bdr);margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.blk-item:hover{box-shadow:0 2px 8px rgba(220,38,38,0.15)}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--gray-bdr);background:var(--white);font-size:12px;font-weight:600;color:var(--gray);transition:all 0.15s}
.fbtn.act{background:var(--navy);color:#fff;border-color:var(--navy)}
.fdrop{padding:6px 12px;border-radius:8px;border:1px solid var(--gray-bdr);background:var(--white);font-size:12px;font-weight:500;color:var(--text2)}

/* Tooltip for collapsed */
.tip{position:relative}

.mobile-bar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--navy);z-index:45;align-items:center;gap:14px;padding:0 16px}
.hamburger{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1}
.mobile-brand{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:48}

/* Responsive */
@media(max-width:1024px){.sb{width:64px}.sb .sb-brand,.sb .sb-title,.sb-item span:not(.ic),.sb-badge,.sb-ctx{display:none}.sb-hd{padding:16px 0;text-align:center}.sb-logo{margin:0 auto}.sb-item{justify-content:center;padding:12px 0}.mn{margin-left:64px}.hero{grid-template-columns:1fr}.twocol{grid-template-columns:1fr}}
@media(max-width:600px){
  .mobile-bar{display:flex}
  .sb{width:260px;transform:translateX(-100%);box-shadow:none}
  .sb .sb-brand,.sb .sb-title,.sb-item span:not(.ic),.sb-badge{display:inline}
  .sb-item{justify-content:flex-start;padding:12px 20px}
  .sb-item span:not(.ic){display:inline}
  .sb.mobile-open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,0.4)}
  .sb-backdrop{display:block}
  .mn{margin-left:0;padding:16px;padding-top:64px}
  .egrid{grid-template-columns:1fr}.stats{flex-direction:column}.hero-stats{grid-template-columns:1fr 1fr}.psel-menu{min-width:280px;max-width:calc(100vw - 40px)}
  .sb-toggle{display:none}
  .topbar{flex-direction:column;align-items:stretch;gap:10px}
  .tb-left{width:100%}.tb-right{width:100%;justify-content:flex-start}
  .tb-search,.search{display:none}
  .psel-menu{left:0;right:auto}
  .rsel-menu{left:0;right:auto;min-width:240px;max-width:calc(100vw - 32px)}
  .dtbl{display:block;overflow-x:auto;white-space:nowrap}
  .card{overflow-x:auto}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="js/data.js"></script>
<script type="text/babel">
const {useState,useMemo,useCallback,useEffect}=React;

// Detect narrow viewport for mobile-specific layouts
const useIsMobile=()=>{
  const[m,setM]=useState(typeof window!=="undefined"&&window.innerWidth<=600);
  useEffect(()=>{
    const h=()=>setM(window.innerWidth<=600);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  return m;
};
const D=window.FINOPS_DATA;

// === HELPERS ===
const SL={closed:"Closed",on_track:"On Track",at_risk:"At Risk",blocked:"Blocked",overdue:"Overdue",not_started:"Not Started",completed:"Done",in_progress:"In Progress",ready:"Ready",waiting:"Waiting"};
const SC={completed:"var(--green)",closed:"var(--green)",in_progress:"var(--blue)",on_track:"var(--blue)",at_risk:"var(--amber)",blocked:"var(--red)",overdue:"var(--red)"};
const Pill=({s})=><span className={`pill pill-${s}`}>{SL[s]||s}</span>;
const PBar=({pct,color,h=6})=><div className="pbar" style={{height:h}}><div className="pfill" style={{width:`${Math.min(pct,100)}%`,background:color||SC[pct>=100?"completed":pct>0?"in_progress":"not_started"]}} /></div>;

const Badge=({brandId,size=40})=>{
  const b=D.brands[brandId];
  const[err,setErr]=useState(false);
  if(!b)return null;
  const f=b.name.toLowerCase()+".png";
  return err?<div className="badge" style={{width:size,height:size,background:b.color,fontSize:size*0.42}}>{b.initial}</div>
    :<img src={`assets/logos/${f}`} alt={b.name} style={{width:size,height:size,objectFit:"contain",flexShrink:0}} onError={()=>setErr(true)}/>;
};

// Circular progress ring
const Ring=({pct,size=120,stroke=10})=>{
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  const col=pct>=100?"var(--green)":pct>=60?"var(--blue)":pct>=30?"var(--amber)":"var(--red)";
  return(<svg width={size} height={size}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={stroke}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={col} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset 0.6s ease"}}/>
    <text x="50%" y="50%" textAnchor="middle" dy="0.1em" fontSize={size*0.26} fontWeight="800" fill="var(--text)">{pct}%</text>
    <text x="50%" y="50%" textAnchor="middle" dy="1.5em" fontSize={size*0.1} fill="var(--muted)">complete</text>
  </svg>);
};

// Process types - only Financial Close active, others show the vision
const PROCESS_TYPES=[
  {id:"close",name:"Financial Close",icon:"📋",active:true},
  {id:"budget",name:"Budgeting & Planning",icon:"📈",active:false},
  {id:"audit",name:"Audit Process",icon:"🔍",active:false},
  {id:"tax",name:"Tax Compliance",icon:"🧾",active:false},
  {id:"treasury",name:"Treasury Operations",icon:"🏦",active:false},
];

// Hierarchical instance tree: Year → Quarter → Month
const INSTANCE_HIERARCHY=[
  {id:"PI-FY2026",label:"FY2026 Annual Close",shortLabel:"2026",type:"annual",status:"in_progress",pct:42,
   children:[
    {id:"PI-Q1",label:"Q1 2026 Quarterly Close",shortLabel:"Q1 2026",type:"quarterly",status:"completed",pct:100,parent:"FY2026 Annual Close",
     children:[
      {id:"PI-JAN",label:"January 2026 Monthly Close",shortLabel:"January",type:"monthly",status:"closed",pct:100,closeDays:4,parent:"Q1 2026"},
      {id:"PI-FEB",label:"February 2026 Monthly Close",shortLabel:"February",type:"monthly",status:"closed",pct:100,closeDays:5,parent:"Q1 2026"},
      {id:"PI-MAR",label:"March 2026 Monthly Close",shortLabel:"March",type:"monthly",status:"closed",pct:100,closeDays:4,parent:"Q1 2026"},
     ]},
    {id:"PI-Q2",label:"Q2 2026 Quarterly Close",shortLabel:"Q2 2026",type:"quarterly",status:"in_progress",pct:78,parent:"FY2026 Annual Close",
     children:[
      {id:"PI-APR",label:"April 2026 Monthly Close",shortLabel:"April",type:"monthly",status:"closed",pct:100,closeDays:5,parent:"Q2 2026"},
      {id:"PI-MAY",label:"May 2026 Monthly Close",shortLabel:"May",type:"monthly",status:"closed",pct:100,closeDays:4,parent:"Q2 2026"},
      {id:"PI-JUN",label:"June 2026 Monthly Close",shortLabel:"June",type:"monthly",status:"active",pct:58,currentDay:3,parent:"Q2 2026",active:true},
     ]},
    {id:"PI-Q3",label:"Q3 2026 Quarterly Close",shortLabel:"Q3 2026",type:"quarterly",status:"upcoming",pct:0,parent:"FY2026 Annual Close",children:[
      {id:"PI-JUL",label:"July 2026 Monthly Close",shortLabel:"July",type:"monthly",status:"upcoming",pct:0,parent:"Q3 2026"},
      {id:"PI-AUG",label:"August 2026 Monthly Close",shortLabel:"August",type:"monthly",status:"upcoming",pct:0,parent:"Q3 2026"},
      {id:"PI-SEP",label:"September 2026 Monthly Close",shortLabel:"September",type:"monthly",status:"upcoming",pct:0,parent:"Q3 2026"},
    ]},

// === PACE CHART (data-driven) ===
// Computes cumulative planned vs actual task completion from D.pace.
// Same logic ports directly to backend: planned[i] = sum(planByBucket[0..i]), actual[i] = sum(actualByBucket[0..i]).
const computePace=(periodId,periodType)=>{
  const planDef=D.pace[periodType];
  if(!planDef)return null;
  const planArr=planDef.planByDay||planDef.planByWindow;
  const total=planArr.reduce((a,b)=>a+b,0);
  const planCum=[];let s=0;planArr.forEach(v=>{s+=v;planCum.push(Math.round(s/total*100))});

  const act=D.pace.actuals[periodId];
  const actArr=(act&&act.arr)||[];
  const actCum=[];let s2=0;actArr.forEach(v=>{s2+=v;actCum.push(Math.round(s2/total*100))});
  const stopIdx=act?(act.closeIndex!==undefined?act.closeIndex:act.currentIndex):-1;

  return{planCum,actCum,xLabels:planDef.xLabels,stopIdx,total,isClosed:act&&act.closeIndex!==undefined};
};

const PaceChart=({periodId,periodType,statusNote})=>{
  const pace=computePace(periodId,periodType);
  if(!pace)return null;
  const{planCum,actCum,xLabels,stopIdx,isClosed}=pace;
  const n=planCum.length;
  const xAt=i=>n>1?(i/(n-1))*100:50;

  // Planned curve points (gold) - always full span ending at 100%
  const planPts=[`0,100`,...planCum.map((p,i)=>`${xAt(i)},${100-p}`)].join(" ");
  // Actual curve points (blue/green) - only up to stopIdx
  const actPoints=actCum.slice(0,stopIdx+1);
  const aLine=[`0,100`,...actPoints.map((p,i)=>`${xAt(i)},${100-p}`)].join(" ");
  const lastX=actPoints.length?xAt(actPoints.length-1):0;
  const lastY=actPoints.length?100-actPoints[actPoints.length-1]:100;
  const aFill=`0,100 ${actPoints.map((p,i)=>`${xAt(i)},${100-p}`).join(" ")} ${lastX},100`;
  const col=isClosed?"#059669":"#2563EB";

  return(<div className="card">
    <div className="card-hd">Close Pace{statusNote?` · ${statusNote}`:""}</div>
    <div style={{position:"relative",height:180}}>
      <div style={{position:"absolute",top:0,bottom:30,left:0,width:32,display:"flex",flexDirection:"column",justifyContent:"space-between",fontSize:10,color:"var(--muted)",textAlign:"right",paddingRight:6}}>
        <span>100%</span><span>75%</span><span>50%</span><span>25%</span><span>0%</span>
      </div>
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{position:"absolute",left:32,right:0,top:0,bottom:30,width:"calc(100% - 32px)",height:"calc(100% - 30px)"}}>
        {[0,25,50,75,100].map(y=><line key={y} x1="0" y1={y} x2="100" y2={y} stroke="#F3F4F6" strokeWidth="0.5"/>)}
        {n>2&&xLabels.map((_,i)=><line key={i} x1={xAt(i)} y1="0" x2={xAt(i)} y2="100" stroke="#FAFAFA" strokeWidth="0.5"/>)}
        {actPoints.length>0&&<polygon points={aFill} fill={isClosed?"rgba(5,150,105,0.12)":"rgba(37,99,235,0.12)"}/>}
        <polyline points={planPts} fill="none" stroke="#D97706" strokeWidth="1.2" strokeDasharray="3,2" vectorEffect="non-scaling-stroke"/>
        {actPoints.length>0&&<polyline points={aLine} fill="none" stroke={col} strokeWidth="1.8" vectorEffect="non-scaling-stroke"/>}
        {actPoints.length>0&&<circle cx={lastX} cy={lastY} r="2.2" fill={col} vectorEffect="non-scaling-stroke"/>}
      </svg>
      <div style={{position:"absolute",bottom:0,left:32,right:0,display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--muted)"}}>
        {xLabels.map(d=><span key={d} style={{flex:1,textAlign:"center"}}>{d}</span>)}
      </div>
    </div>
    <div style={{display:"flex",gap:16,marginTop:12,fontSize:11}}>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:12,height:2,background:"#D97706",display:"inline-block"}}/>Planned (Target)</span>
      <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:12,height:2,background:col,display:"inline-block"}}/>{isClosed?"Completed":"Actual"}</span>
    </div>
  </div>);
};

// === PROCESS DAG ===
const DAG=({period})=>{
  const isMobile=useIsMobile();
  const ptype=period?.type||"monthly";
  const isLive=period?.status==="active";
  const isClosed=period?.status==="closed"||period?.status==="completed";
  const isUpcoming=period?.status==="upcoming";

  // Base monthly tasks from template
  let tasks=D.processTemplates[0].subProcesses.flatMap(sp=>sp.tasks?.map(t=>({...t,sp:sp.name,sys:sp.systemId}))||[]);
  // Quarterly adds quarterly add-on tasks (day 6 = after monthly closes); Annual adds those + annual add-ons (day 7)
  if(ptype==="quarterly"||ptype==="annual"){
    const q=D.processTemplates[1]?.additionalSubProcesses||[];
    q.forEach(sp=>sp.tasks?.forEach(t=>tasks.push({...t,sp:sp.name,sys:sp.systemId,targetDay:6,addon:"quarterly"})));
  }
  if(ptype==="annual"){
    const a=D.processTemplates[2]?.additionalSubProcesses||[];
    a.forEach(sp=>sp.tasks?.forEach(t=>tasks.push({...t,sp:sp.name,sys:sp.systemId,targetDay:7,addon:"annual"})));
  }

  // Status per task — live June uses the real snapshot; closed = all done; upcoming = all not started
  const liveStatus={"T-DMS-VERIFY":"completed","T-AP-CUTOFF":"completed","T-AP-GRNI":"completed","T-AR-BILL":"completed","T-AR-BAD":"completed","T-PAY-CALC":"completed","T-PAY-POST":"completed","T-ASSET-DEPR":"completed","T-ASSET-RECON":"completed","T-INV-RECON":"completed","T-INV-WD":"completed","T-EXP-PROC":"completed","T-EXP-ACC":"completed","T-BANK-IMP":"completed","T-BANK-REC":"in_progress","T-IC-MATCH":"blocked","T-IC-RESOLVE":"waiting","T-TAX-CALC":"in_progress","T-TAX-POST":"waiting","T-FX-REVAL":"waiting","T-PROV-UPD":"waiting"};
  const statusFor=t=>isClosed?"completed":isUpcoming?"not_started":(t.addon?"waiting":(liveStatus[t.id]||"waiting"));

  const sColor=s=>({completed:"var(--green)",in_progress:"var(--blue)",blocked:"var(--red)",waiting:"#D1D5DB",not_started:"#D1D5DB"})[s]||"#D1D5DB";

  // Columns: monthly = days 1-5; quarterly adds "Q Add-ons"; annual adds "Annual Add-ons"
  let dayCols=[1,2,3,4,5];
  const colLabels={1:"Day 1",2:"Day 2",3:"Day 3",4:"Day 4",5:"Day 5",6:"Q Add-ons",7:"Annual Add-ons"};
  if(ptype==="quarterly")dayCols=[1,2,3,4,5,6];
  if(ptype==="annual")dayCols=[1,2,3,4,5,6,7];
  const cols={};dayCols.forEach(d=>cols[d]=[]);
  tasks.forEach(t=>{const d=t.targetDay||1;if(cols[d])cols[d].push(t);else cols[1].push(t)});

  const subtitle=ptype==="monthly"?"Monthly Close Template":ptype==="quarterly"?"Quarterly Close = Monthly tasks + quarterly add-ons (provisions, compliance, board, forecast)":"Annual Close = Quarterly tasks + annual add-ons (audit, statutory, tax, budget)";

  return(<div>
    <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>Process Dependency Graph</div>
    <div style={{fontSize:13,color:"var(--gray)",marginBottom:20}}>{period?.label} • {subtitle}</div>
    <div className="card" style={isMobile?{}:{overflowX:"auto"}}>
      <div style={isMobile?{padding:"8px 0"}:{display:"flex",gap:16,minWidth:dayCols.length*170,padding:"8px 0"}}>
        {dayCols.map(day=><div key={day} style={isMobile?{marginBottom:18}:{flex:1,minWidth:155}}>
          <div style={{fontSize:11,fontWeight:700,color:day>=6?"var(--amber)":"var(--blue)",marginBottom:10,textAlign:isMobile?"left":"center",padding:"4px 8px",background:day>=6?"var(--amber-bg)":"var(--blue-bg)",borderRadius:4}}>{colLabels[day]}{isMobile?` (${(cols[day]||[]).length})`:""}</div>
          {(cols[day]||[]).map(t=>{const st=statusFor(t);return(
            <div key={t.id} style={{background:sColor(st)+"1A",border:`1.5px solid ${sColor(st)}`,borderRadius:8,padding:"8px 10px",marginBottom:6,fontSize:11}}>
              <div style={{fontWeight:700,color:"var(--text)",marginBottom:2}}>{t.name}</div>
              <div style={{color:"var(--muted)",fontSize:10}}>{t.ownerRole} • {t.effortHrs}h</div>
              <div style={{display:"flex",alignItems:"center",gap:4,marginTop:4}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:sColor(st)}}/>
                <span style={{fontSize:10,fontWeight:600,color:sColor(st)}}>{SL[st]}</span>
              </div>
              {t.dependsOn&&t.dependsOn.length>0&&<div style={{fontSize:9,color:"var(--muted)",marginTop:3}}>← {t.dependsOn.join(", ")}</div>}
            </div>
          )})}
        </div>)}
      </div>
    </div>
    {(ptype==="quarterly"||ptype==="annual")&&<div className="info" style={{marginTop:16}}>
      <strong>Composition:</strong> The {ptype==="quarterly"?"Q Add-ons":"add-on"} columns depend on the underlying monthly closes completing first. Quarterly add-on tasks unlock only after the 3rd monthly close (June) signs off{ptype==="annual"?", and annual add-ons unlock after Q4 completes":""}.
    </div>}
  </div>);
};

    <Section title="Completed" color="var(--green)" icon="✓" tasks={mt.completed} render={t=>(
      <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",fontSize:13,color:"var(--gray)"}}>
        <span style={{color:"var(--green)"}}>✓</span><span style={{textDecoration:"line-through"}}>{t.name}</span>
        <span style={{fontSize:11,color:"var(--muted)"}}>· completed Day {t.completedDay}</span>
      </div>
    )}/>
  </div>);
};

// === CONSOLIDATION DASHBOARD (Group Controller) ===
const ConsolidationDashboard=({onEntClick})=>{
  const tracker=D.signOffTracker;
  const signedOff=tracker.filter(t=>t.signedOff);
  const pending=tracker.filter(t=>!t.signedOff);
  const blocked=pending.filter(t=>t.blocker);
  const canConsolidate=pending.length===0;
  return(<div>
    <div style={{marginBottom:20}}>
      <div style={{fontSize:22,fontWeight:800}}>Consolidation Readiness</div>
      <div style={{fontSize:13,color:"var(--gray)"}}>June 2026 Close · Group Controller view</div>
    </div>
    <div className="stats">
      <div className="stat" style={{borderLeftColor:"var(--green)"}}><div className="v">{signedOff.length}</div><div className="l">Signed Off</div></div>
      <div className="stat" style={{borderLeftColor:"var(--blue)"}}><div className="v">{pending.length-blocked.length}</div><div className="l">In Progress</div></div>
      <div className="stat" style={{borderLeftColor:"var(--red)"}}><div className="v">{blocked.length}</div><div className="l">Blocked</div></div>
      <div className="stat" style={{borderLeftColor:canConsolidate?"var(--green)":"var(--amber)"}}><div className="v" style={{fontSize:18}}>{canConsolidate?"READY":"BLOCKED"}</div><div className="l">Consolidation</div></div>
    </div>
    <div className="info" style={{background:canConsolidate?"var(--green-bg)":"var(--amber-bg)",border:`1px solid ${canConsolidate?"var(--green-bdr)":"var(--amber-bdr)"}`,color:canConsolidate?"#064E3B":"#78350F"}}>
      <strong>{canConsolidate?"All entities signed off.":`Consolidation cannot start until all 20 entities sign off. ${pending.length} remaining (${blocked.length} blocked).`}</strong> Group-level tasks (IC elimination, currency conversion, group statements) depend on every entity completing its sign-off.
    </div>
    <div className="card" style={{marginBottom:16}}>
      <div className="card-hd">Entity Sign-Off Tracker</div>
      <table className="dtbl"><thead><tr>{["Entity","Status","Signed By / Blocker","Action"].map(h=><th key={h}>{h}</th>)}</tr></thead>
        <tbody>{tracker.map(t=>{const e=getEnt(t.id);return(
          <tr key={t.id} style={{cursor:"pointer"}} onClick={()=>onEntClick(t.id)}>
            <td style={{fontWeight:600}}>{bn(e?.brand)} {cn(e?.country)}</td>
            <td>{t.signedOff?<Pill s="completed"/>:t.blocker?<Pill s="blocked"/>:<Pill s="in_progress"/>}</td>
            <td style={{fontSize:12,color:t.blocker?"var(--red)":"var(--gray)"}}>{t.signedOff?`${t.signedBy} · ${t.at}`:t.blocker?`⚠ ${t.blocker}`:"In progress..."}</td>
            <td>{t.signedOff?<span style={{fontSize:11,color:"var(--green)"}}>✓ Done</span>:<span style={{fontSize:11,color:"var(--blue)"}}>View →</span>}</td>
          </tr>
        )})}</tbody>
      </table>
    </div>
    <div className="card">
      <div className="card-hd">Group-Level Tasks (waiting on entity sign-offs)</div>
      {["IC Elimination","Currency Conversion","Group Adjustments","Consolidated Statements","Board Pack"].map(t=>(
        <div key={t} className="spr" style={{cursor:"default"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#D1D5DB"}}/>
          <div style={{flex:1,fontSize:13,fontWeight:500}}>{t}</div>
          <Pill s="waiting"/>
        </div>
      ))}
    </div>
  </div>);
};

// === BLOCKER QUEUE DASHBOARD (Close Manager) ===
const BlockerQueueDashboard=({onEntClick,onBlockerClick})=>{
  const blockers=D.entityStatuses.filter(e=>e.blocker).map(e=>({...e,entity:getEnt(e.id)}));
  const sorted=blockers.sort((a,b)=>(b.blocker.blocks?.length||0)-(a.blocker.blocks?.length||0));
  return(<div>
    <div style={{marginBottom:20}}>
      <div style={{fontSize:22,fontWeight:800}}>Close Operations</div>
      <div style={{fontSize:13,color:"var(--gray)"}}>June 2026 Close · Day 3 · Close Manager view</div>
    </div>
    <div className="stats">
      <div className="stat" style={{borderLeftColor:"var(--red)"}}><div className="v">7</div><div className="l">Blocked Tasks</div></div>
      <div className="stat" style={{borderLeftColor:"var(--amber)"}}><div className="v">4</div><div className="l">Entities at Risk</div></div>
      <div className="stat" style={{borderLeftColor:"var(--navy)"}}><div className="v">+1.5d</div><div className="l">Critical Path Impact</div></div>
      <div className="stat" style={{borderLeftColor:"var(--blue)"}}><div className="v">312<span style={{fontSize:14,color:"var(--muted)"}}>/526</span></div><div className="l">Tasks Done</div></div>
    </div>
    <div className="card">
      <div className="card-hd" style={{color:"var(--red)"}}>Blocker Queue (sorted by impact)</div>
      {sorted.map(es=>{
        const sev=es.status==="at_risk"&&es.blocker.blocks?.length>=4?"red":"amber";
        return(
        <div key={es.id} style={{padding:14,border:`1px solid ${sev==="red"?"var(--red-bdr)":"var(--amber-bdr)"}`,background:sev==="red"?"var(--red-bg)":"var(--amber-bg)",borderRadius:8,marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <span style={{fontSize:16}}>{sev==="red"?"🔴":"🟠"}</span>
            <Badge brandId={es.entity.brand} size={28}/>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:700}}>{bn(es.entity.brand)} {cn(es.entity.country)} — {es.blocker.task}</div>
              <div style={{fontSize:12,color:sev==="red"?"#7F1D1D":"#78350F"}}>Blocks {es.blocker.blocks?.length||0} downstream tasks: {es.blocker.blocks?.join(", ")}</div>
            </div>
          </div>
          <div style={{fontSize:12,color:"var(--text2)",marginBottom:8,paddingLeft:36}}>{es.blocker.desc}</div>
          <div style={{display:"flex",gap:8,paddingLeft:36}}>
            <button className="btn btn-p" style={{padding:"5px 12px"}} onClick={()=>onBlockerClick(es.id)}>View & Resolve</button>
            <button className="btn btn-o" style={{padding:"5px 12px"}}>Chase {es.blocker.resolutionAssignee?.split("(")[0]?.split(" ")[0]||"Owner"}</button>
            <button className="btn btn-o" style={{padding:"5px 12px"}}>Reassign</button>
          </div>
        </div>
      )})}
    </div>
  </div>);
};

// === TOP BAR ===
const TopBar=({period,onPeriod,role,onRole})=>{
  const[pOpen,setPOpen]=useState(false);
  const[rOpen,setROpen]=useState(false);
  const[procType,setProcType]=useState(PROCESS_TYPES[0]);
  const[exp,setExp]=useState({"PI-FY2026":true,"PI-Q2":true});
  const tog=(id,e)=>{e.stopPropagation();setExp(p=>({...p,[id]:!p[id]}))};

  const renderNode=(n,depth=0)=>{
    const ch=n.children&&n.children.length>0;
    const isExp=exp[n.id];
    const sel=period.id===n.id;
    return(<div key={n.id}>
      <div className={`irow${sel?" act":""}`} style={{marginLeft:depth*16}}
        onClick={()=>{onPeriod(n);setPOpen(false)}}>
        {ch?<span onClick={e=>tog(n.id,e)} style={{fontSize:10,color:"var(--muted)",transform:isExp?"rotate(90deg)":"none",transition:"transform 0.2s",display:"inline-block",width:14,cursor:"pointer"}}>▸</span>:<span style={{width:14}}/>}
        <span style={{fontSize:13}}>{n.type==="annual"?"📅":n.type==="quarterly"?"📊":"📋"}</span>
        <span style={{flex:1,fontSize:13,fontWeight:sel?700:500,color:sel?"var(--blue)":"var(--text2)"}}>{n.shortLabel}</span>
        <InstPill inst={n}/>
      </div>
      {ch&&isExp&&n.children.map(c=>renderNode(c,depth+1))}
    </div>);
  };

  return(<div className="topbar">
    <div className="tb-left">
      {/* Process Type Selector */}
      <select className="fdrop" style={{padding:"10px 12px",fontSize:13,fontWeight:600,background:"var(--gray-bg)"}} value={procType.id}
        onChange={e=>{const pt=PROCESS_TYPES.find(p=>p.id===e.target.value);if(pt.active)setProcType(pt)}}>
        {PROCESS_TYPES.map(pt=><option key={pt.id} value={pt.id} disabled={!pt.active}>{pt.icon} {pt.name}{!pt.active?" (Coming Soon)":""}</option>)}
      </select>
      {/* Instance Drill-down Selector */}
      <div className="psel">
        <button className="psel-btn" onClick={()=>{setPOpen(!pOpen);setROpen(false)}}>
          <span>📋</span><span>{period.label}</span><span style={{fontSize:11}}>▾</span>
        </button>
        {pOpen&&<div className="psel-menu">
          <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",padding:"6px 10px",letterSpacing:1}}>FINANCIAL CLOSE · SELECT PERIOD</div>
          {INSTANCE_HIERARCHY.map(n=>renderNode(n))}
          <div style={{borderTop:"1px solid var(--gray-bdr)",marginTop:6,padding:"8px 10px",fontSize:11,color:"var(--muted)"}}>2025 (archived) · earlier years available</div>
        </div>}
      </div>
    </div>
    <div className="tb-right">
      <div className="search"><span>🔍</span><span>Search...</span></div>
      <div className="rsel">
        <button className="rsel-btn" onClick={()=>{setROpen(!rOpen);setPOpen(false)}}>
          <span style={{width:24,height:24,borderRadius:"50%",background:"var(--navy)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{role.name.split(" ").map(w=>w[0]).join("").substring(0,2)}</span>
          <span>{role.name}</span><span style={{fontSize:11}}>▾</span>
        </button>
        {rOpen&&<div className="rsel-menu">
          <div style={{fontSize:10,fontWeight:700,color:"var(--muted)",padding:"6px 10px",letterSpacing:1}}>VIEW AS ROLE</div>
          {ROLES.map(r=>(
            <div key={r.id} className={`rsel-item${role.id===r.id?" act":""}`} onClick={()=>{onRole(r);setROpen(false)}}>
              <div style={{flex:1}}><div>{r.name}</div><div style={{fontSize:10,color:"var(--muted)"}}>{r.scope}</div></div>
              {role.id===r.id&&<span>✓</span>}
            </div>
          ))}
        </div>}
      </div>
    </div>
  </div>);
};

// === MAIN APP ===
const App=()=>{
  const[tab,setTab]=useState("cmd");
  const[view,setView]=useState("overview");
  const[vd,setVD]=useState({});
  const[col,setCol]=useState(false);
  const[mobileOpen,setMobileOpen]=useState(false);
  const[period,setPeriod]=useState(findInstance("PI-JUN")); // June default
  const[role,setRole]=useState(ROLES[0]); // CFO default

  const nav=(v,data={})=>{setView(v);setVD(data)};
  const switchTab=t=>{setTab(t);setView("overview");setVD({})};

  const bc=()=>{
    const items=[{l:period.shortLabel,v:"overview"}];
    if(["entity","task","loc"].includes(view)){
      const e=getEnt(vd.eid);
      items.push({l:`${bn(e?.brand)} ${cn(e?.country)}`,v:"entity",d:{eid:vd.eid}});
    }
    if(view==="task")items.push({l:vd.blocker?.task||"Task"});
    if(view==="loc")items.push({l:vd.loc?.name||"Location"});
    return items;
  };

  // Period-aware context chips
  const dayChip=period.status==="active"?`Day ${period.currentDay} of 5`:period.status==="closed"?`Closed in ${period.closeDays} days`:period.status==="completed"?"All periods completed":period.status==="in_progress"?`${period.pct}% complete`:"Not yet started";
  const statusChip=period.status==="active"?{t:"On Pace",c:"var(--green)"}:period.status==="closed"||period.status==="completed"?{t:"Completed",c:"var(--green)"}:period.status==="in_progress"?{t:"In Progress",c:"var(--blue)"}:{t:"Upcoming",c:"var(--muted)"};

  return(<div className="app">
    {/* Mobile top bar with hamburger */}
    <div className="mobile-bar">
      <button className="hamburger" onClick={()=>setMobileOpen(true)} aria-label="Open menu">☰</button>
      <div className="mobile-brand"><span style={{color:"#fff"}}>Fin</span><span style={{color:"#5B9BF5"}}>Bridge</span></div>
    </div>
    {/* Backdrop when drawer open */}
    {mobileOpen&&<div className="sb-backdrop" onClick={()=>setMobileOpen(false)}/>}
    <Sidebar tab={tab} onTab={t=>{switchTab(t);setMobileOpen(false)}} col={col} onCol={()=>setCol(!col)} roleId={role.id} mobileOpen={mobileOpen}/>
    <div className={`mn${col?" exp":""}`}>
      <TopBar period={period} onPeriod={p=>{setPeriod(p);setView("overview")}} role={role} onRole={r=>{setRole(r);setView("overview");setTab((NAV_BY_ROLE[r.id]||NAV_BY_ROLE.cfo)[0].id);setMobileOpen(false)}}/>

      {tab==="cmd"&&view!=="overview"&&<div className="bc">
        {bc().map((b,i)=><React.Fragment key={i}>
          {i>0&&<span style={{color:"#D1D5DB"}}>›</span>}
          {i<bc().length-1?<a onClick={()=>nav(b.v,b.d||{})}>{b.l}</a>:<span className="cur">{b.l}</span>}
        </React.Fragment>)}
      </div>}

      {tab==="cmd"&&view==="overview"&&(()=>{
        // PERSONA ROUTING: each role lands on a different dashboard
        const rid=role.id;
        // Task Owner → personal to-do list (no period context strip)
        if(rid==="task_owner")return <MyTasksDashboard onTaskClick={()=>{}}/>;
        // Entity Controller → straight to their entity detail
        if(rid==="entity_ctrl")return <div>
          <div className="ctxstrip"><div className="title">My Entity</div><div className="chip">⏱ {dayChip}</div><div className="chip" style={{color:statusChip.c}}>● {statusChip.t}</div></div>
          <EntDetail eid="TOY-UAE" nav={nav}/>
        </div>;
        // Group Controller → consolidation readiness
        if(rid==="group")return <ConsolidationDashboard onEntClick={id=>nav("entity",{eid:id})}/>;
        // Close Manager → blocker queue
        if(rid==="close_mgr")return <BlockerQueueDashboard onEntClick={id=>nav("entity",{eid:id})} onBlockerClick={id=>{const es=getES(id);nav("task",{eid:id,blocker:es.blocker})}}/>;
        // CFO (and default) → portfolio dashboard
        return(<div>
          <div className="ctxstrip">
            <div className="title">{period.label}</div>
            {period.parent&&<div className="chip">📅 {period.parent}</div>}
            <div className="chip">⏱ {dayChip}</div>
            <div className="chip" style={{color:statusChip.c}}>● {statusChip.t}</div>
          </div>
          {period.type!=="monthly"?(
            <div>
              <div style={{display:"flex",gap:20,marginBottom:20,flexWrap:"wrap"}}>
                <div className="card" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:220,padding:30}}>
                  <Ring pct={period.pct} size={150}/>
                  <div style={{fontSize:14,fontWeight:700,marginTop:14}}>{period.shortLabel} Progress</div>
                </div>
                <div className="card" style={{flex:1,minWidth:280}}>
                  <div className="card-hd">{period.type==="annual"?"Quarters":"Months"} in {period.shortLabel}</div>
                  {(period.children||[]).map(child=>(
                    <div key={child.id} className="spr" onClick={()=>setPeriod(child)}>
                      <span style={{fontSize:14}}>{child.type==="quarterly"?"📊":"📋"}</span>
                      <div style={{flex:1,fontSize:13,fontWeight:600}}>{child.shortLabel}</div>
                      <div style={{width:120}}><PBar pct={child.pct} color={instStatusColor(child.status)}/></div>
                      <InstPill inst={child}/>
                    </div>
                  ))}
                </div>
              </div>
              {D.pace.actuals[period.id]&&D.pace.actuals[period.id].arr.length>0&&(
                <div style={{marginBottom:20}}>
                  <PaceChart periodId={period.id} periodType={period.type} statusNote={period.type==="quarterly"?"Across 3 months + add-ons":"Across 4 quarters + add-ons"}/>
                </div>
              )}
              <div className="info">
                <strong>This is a {period.type} view.</strong> {period.type==="annual"?"The pace chart tracks task completion across all four quarters plus annual add-ons (audit, statutory, tax). Click any quarter to drill into its months, or a month for live entity tracking.":"The pace chart tracks task completion across April, May, June, plus the Q2 add-on tasks (provisions, compliance, board report) that begin only after June closes. Click a month for live entity tracking."}
              </div>
            </div>
          ):(
            period.status==="upcoming"?(
              <div className="card" style={{textAlign:"center",padding:50}}>
                <div style={{fontSize:40,marginBottom:12}}>🗓️</div>
                <div style={{fontSize:16,fontWeight:700}}>{period.label} hasn't started yet</div>
                <div style={{fontSize:13,color:"var(--gray)",marginTop:6}}>This close cycle is scheduled to begin on the first business day of the period. Initiate it early from Configuration → Initiate Close.</div>
              </div>
            ):(
              <Overview onEntClick={id=>nav("entity",{eid:id})} onBlockerClick={id=>{const es=getES(id);nav("task",{eid:id,blocker:es.blocker})}} roleId={role.id} closed={period.status==="closed"} periodId={period.id} periodType="monthly" statusNote={period.status==="closed"?(period.closeDays<5?`Closed Day ${period.closeDays} · 1 Day Early`:`Closed Day ${period.closeDays} · On Target`):"Live · Day 3"}/>
            )
          )}
        </div>);
      })()}
      {tab==="cmd"&&view==="entity"&&<EntDetail eid={vd.eid} nav={nav}/>}
      {tab==="cmd"&&view==="task"&&<TaskDetail eid={vd.eid} blocker={vd.blocker}/>}
      {tab==="cmd"&&view==="loc"&&<LocDetail loc={vd.loc} lid={vd.lid}/>}
      {tab==="flow"&&<Flow period={period} roleId={role.id}/>}
      {tab==="dag"&&<DAG period={period}/>}
      {tab==="cfg"&&<Config canEdit={role.id==="admin"}/>}
    </div>
  </div>);
};

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
