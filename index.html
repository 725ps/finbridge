<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#1B2A4A;--navy-l:#243656;--blue:#2563EB;--blue-bg:#EFF6FF;--blue-bdr:#BFDBFE;--green:#059669;--green-bg:#ECFDF5;--green-bdr:#A7F3D0;--amber:#D97706;--amber-bg:#FFFBEB;--red:#DC2626;--red-bg:#FEF2F2;--red-bdr:#FECACA;--gray:#6B7280;--gray-bg:#F4F5F7;--gray-bdr:#E5E7EB;--muted:#9CA3AF;--text:#1A1A2E;--text2:#374151;--white:#FFFFFF;--r:12px;--rs:8px;--shadow:0 1px 3px rgba(0,0,0,0.06)}
html{scroll-behavior:smooth;background:#1B2A4A}
body{font-family:'Inter',system-ui,sans-serif;background:var(--gray-bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
table{border-collapse:collapse;width:100%}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sb{width:260px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:width 0.3s ease,transform 0.3s ease;overflow:hidden}
.sb.col{width:64px}
.sb-hd{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08);min-height:80px}
.sb-logo{height:28px;margin-bottom:6px;opacity:0.9}
.sb-brand{font-size:10px;font-weight:700;color:#93C5FD;letter-spacing:2px;white-space:nowrap;overflow:hidden}
.sb-title{font-size:15px;font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--rs);margin-bottom:2px;cursor:pointer;transition:all 0.15s;font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);white-space:nowrap}
.sb-item:hover{background:rgba(255,255,255,0.08);color:#fff}
.sb-item.act{background:rgba(255,255,255,0.12);color:#fff;font-weight:600}
.sb-item.dis{opacity:0.3;cursor:default}
.sb-item .ic{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.sb-badge{font-size:9px;background:var(--blue);padding:2px 8px;border-radius:4px;font-weight:700}
.sb-ctx{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08);font-size:12px;white-space:nowrap;overflow:hidden}
.sb-ctx .lbl{color:#93C5FD;font-weight:700;font-size:10px;letter-spacing:1.5px;margin-bottom:8px}
.sb-toggle{padding:12px;background:rgba(255,255,255,0.04);border:none;color:#94A3B8;font-size:13px;text-align:center;transition:all 0.15s;white-space:nowrap}
.sb-toggle:hover{background:rgba(255,255,255,0.08)}

/* Main */
.mn{margin-left:260px;flex:1;padding:28px 36px;max-width:1200px;transition:margin-left 0.3s}
.mn.exp{margin-left:64px}

/* Cards & Components */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--gray-bdr);padding:20px;transition:all 0.2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.card-hd{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:14px}
.stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.stat{background:var(--white);border-radius:var(--r);padding:16px 20px;flex:1;min-width:130px;border-left:4px solid var(--navy)}
.stat .v{font-size:26px;font-weight:800;line-height:1}
.stat .l{font-size:11px;color:var(--gray);margin-top:4px;font-weight:500}
.pill{display:inline-flex;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:0.3px}
.pill-closed{background:var(--green-bg);color:var(--green)}.pill-on_track{background:var(--blue-bg);color:var(--blue)}
.pill-at_risk{background:var(--amber-bg);color:var(--amber)}.pill-blocked,.pill-overdue{background:var(--red-bg);color:var(--red)}
.pill-completed{background:var(--green-bg);color:var(--green)}.pill-in_progress{background:var(--blue-bg);color:var(--blue)}
.pill-waiting,.pill-not_started{background:#F3F4F6;color:var(--muted)}.pill-ready{background:#F5F3FF;color:#7C3AED}
.pbar{width:100%;height:6px;background:#E5E7EB;border-radius:6px;overflow:hidden}
.pfill{height:100%;border-radius:6px;transition:width 0.5s ease}
.badge{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;flex-shrink:0}

/* Entity Grid */
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.ecard{background:var(--white);border-radius:var(--r);padding:16px;border:1px solid var(--gray-bdr);cursor:pointer;transition:all 0.2s}
.ecard:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);border-color:var(--blue-bdr)}

/* Tables */
.dtbl{font-size:13px}
.dtbl th{padding:8px 12px;text-align:left;font-weight:600;color:var(--gray);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--gray-bdr)}
.dtbl td{padding:10px 12px;border-bottom:1px solid #F3F4F6}
.dtbl tr:hover{background:#FAFAFA}

/* Sub-process rows */
.spr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background 0.15s}
.spr:hover{background:#FAFAFA;margin:0 -8px;padding:10px 8px;border-radius:6px}

/* Breadcrumb */
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-bottom:16px;flex-wrap:wrap}
.bc a{color:var(--blue);cursor:pointer;font-weight:500;text-decoration:none}
.bc a:hover{text-decoration:underline}
.bc .cur{color:var(--text);font-weight:600}

/* Flow */
.fnode{position:absolute;border-radius:10px;padding:12px 10px;text-align:center;cursor:pointer;transition:all 0.2s;z-index:2}
.fnode:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(0,0,0,0.12)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-size:12px;font-weight:600;border:none;transition:all 0.15s}
.btn-p{background:var(--navy);color:#fff}.btn-p:hover{background:var(--navy-l)}
.btn-o{background:transparent;border:1px solid var(--gray-bdr);color:var(--text)}.btn-o:hover{background:#F3F4F6}
.btn-g{background:var(--green);color:#fff}
.btn-full{width:100%;justify-content:center;padding:12px}

/* Blocker */
.blocker{background:var(--red-bg);border-radius:var(--r);padding:16px;border:1px solid var(--red-bdr);margin-bottom:16px}
.resolution{background:var(--green-bg);border-radius:var(--rs);padding:14px;border:1px solid var(--green-bdr);margin-bottom:12px}

/* Info */
.info{border-radius:var(--rs);padding:14px;margin:16px 0;font-size:13px;line-height:1.6;background:var(--blue-bg);border:1px solid var(--blue-bdr);color:#1E3A5F}

/* Bar chart */
.bars{display:flex;align-items:flex-end;gap:6px;height:130px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.5s;min-height:2px}

/* Config tabs */
.ctabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.ctab{padding:8px 16px;border-radius:var(--rs);border:none;font-size:13px;font-weight:600;transition:all 0.15s}
.ctab.act{background:var(--navy);color:#fff}
.ctab:not(.act){background:#F3F4F6;color:var(--gray)}
.ctab:not(.act):hover{background:#E5E7EB}

/* Instance tree */
.irow{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--rs);margin-bottom:3px;cursor:pointer;transition:all 0.15s}
.irow:hover{background:#F3F4F6}
.irow.act{background:var(--blue-bg);border:1px solid var(--blue-bdr)}

/* Wizard steps */
.wstep{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.wdot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.wdot.done{background:var(--green);color:#fff}
.wdot.cur{background:var(--blue);color:#fff}
.wdot.pend{background:#E5E7EB;color:var(--muted)}
.wline{flex:1;height:2px;background:#E5E7EB}

/* Pace chart */
.pace{position:relative;height:160px;background:var(--white);border-radius:var(--r);border:1px solid var(--gray-bdr);padding:20px;margin-bottom:20px}
.pace-grid{position:absolute;inset:40px 20px 30px 40px;display:flex;flex-direction:column;justify-content:space-between}
.pace-line{width:100%;height:1px;background:#F3F4F6}
.pace-labels{position:absolute;bottom:8px;left:40px;right:20px;display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.pace-ylabels{position:absolute;top:40px;bottom:30px;left:4px;display:flex;flex-direction:column;justify-content:space-between;font-size:10px;color:var(--muted);text-align:right;width:30px}

/* Collapsed sidebar - center icons cleanly */
.sb.col .sb-hd{padding:16px 0;text-align:center}
.sb.col .sb-logo{margin:0 auto 0}
.sb.col .sb-item{justify-content:center;padding:12px 0;gap:0}
.sb.col .sb-item .ic{width:auto}
.sb.col .sb-nav{padding:12px 6px}

/* Top header bar */
.topbar{display:flex;align-items:center;justify-content:space-between;background:var(--white);border-radius:var(--r);border:1px solid var(--gray-bdr);padding:14px 20px;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.tb-left{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.tb-right{display:flex;align-items:center;gap:12px}

/* Period selector dropdown */
.psel{position:relative}
.psel-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600}
.psel-btn:hover{background:var(--navy-l)}
.psel-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--white);border:1px solid var(--gray-bdr);border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,0.12);z-index:100;min-width:340px;padding:8px;max-height:480px;overflow-y:auto}

/* Role selector */
.rsel{position:relative}
.rsel-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--gray-bg);border:1px solid var(--gray-bdr);border-radius:var(--rs);font-size:13px;font-weight:600;color:var(--text2)}
.rsel-btn:hover{background:#E5E7EB}
.rsel-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--white);border:1px solid var(--gray-bdr);border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,0.12);z-index:100;min-width:220px;padding:6px}
.rsel-item{padding:9px 12px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.rsel-item:hover{background:var(--gray-bg)}
.rsel-item.act{background:var(--blue-bg);color:var(--blue);font-weight:600}

/* Search */
.search{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--gray-bg);border:1px solid var(--gray-bdr);border-radius:var(--rs);font-size:13px;color:var(--muted);min-width:180px}

/* Context strip */
.ctxstrip{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.ctxstrip .title{font-size:22px;font-weight:800}
.ctxstrip .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--white);border:1px solid var(--gray-bdr);border-radius:20px;font-size:12px;font-weight:500;color:var(--text2)}

/* Circular progress */
.ring-wrap{display:flex;align-items:center;justify-content:center}
.ring-label{font-size:11px;color:var(--gray);text-align:center;margin-top:4px;font-weight:500}

/* Hero layout */
.hero{display:grid;grid-template-columns:1fr 200px;gap:16px;margin-bottom:20px}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hero-ring{background:var(--white);border-radius:var(--r);border:1px solid var(--gray-bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* Two column */
.twocol{display:grid;grid-template-columns:1fr 380px;gap:16px;margin-bottom:20px}

/* Blocker list item */
.blk-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:8px;background:var(--red-bg);border:1px solid var(--red-bdr);margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.blk-item:hover{box-shadow:0 2px 8px rgba(220,38,38,0.15)}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fbtn{padding:6px 14px;border-radius:20px;border:1px solid var(--gray-bdr);background:var(--white);font-size:12px;font-weight:600;color:var(--gray);transition:all 0.15s}
.fbtn.act{background:var(--navy);color:#fff;border-color:var(--navy)}
.fdrop{padding:6px 12px;border-radius:8px;border:1px solid var(--gray-bdr);background:var(--white);font-size:12px;font-weight:500;color:var(--text2)}

/* Tooltip for collapsed */
.tip{position:relative}

.mobile-bar{display:none;position:fixed;top:0;left:0;right:0;height:52px;background:var(--navy);z-index:45;align-items:center;gap:14px;padding:0 16px}
.hamburger{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1}
.mobile-brand{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:48}

/* Responsive */
@media(max-width:1024px){.sb{width:64px}.sb .sb-brand,.sb .sb-title,.sb-item span:not(.ic),.sb-badge,.sb-ctx{display:none}.sb-hd{padding:16px 0;text-align:center}.sb-logo{margin:0 auto}.sb-item{justify-content:center;padding:12px 0}.mn{margin-left:64px}.hero{grid-template-columns:1fr}.twocol{grid-template-columns:1fr}}
@media(max-width:600px){
  .mobile-bar{display:flex}
  .sb{width:260px;transform:translateX(-100%);box-shadow:none}
  .sb .sb-brand,.sb .sb-title,.sb-item span:not(.ic),.sb-badge{display:inline}
  .sb-item{justify-content:flex-start;padding:12px 20px}
  .sb-item span:not(.ic){display:inline}
  .sb.mobile-open{transform:translateX(0);box-shadow:0 0 40px rgba(0,0,0,0.4)}
  .sb-backdrop{display:block}
  .mn{margin-left:0;padding:16px;padding-top:64px;min-width:0;max-width:100vw;overflow-x:hidden}
  .app{max-width:100vw;overflow-x:hidden}
  .egrid{grid-template-columns:1fr}.stats{flex-direction:column}.hero-stats{grid-template-columns:1fr 1fr}.psel-menu{min-width:280px;max-width:calc(100vw - 40px)}
  .sb-toggle{display:none}
  .topbar{flex-direction:column;align-items:stretch;gap:10px}
  .tb-left{width:100%}.tb-right{width:100%;justify-content:flex-start}
  .tb-search,.search{display:none}
  .psel-menu{left:0;right:auto}
  .rsel-menu{left:0;right:auto;min-width:240px;max-width:calc(100vw - 32px)}
  .dtbl{white-space:nowrap}
  .card{overflow-x:auto;max-width:100%}
  .twocol,.hero{min-width:0}
  .twocol>*,.hero>*{min-width:0}
}
</style>
</head>
